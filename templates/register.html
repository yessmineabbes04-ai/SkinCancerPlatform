{% extends 'base.html' %}
{% block title %}Register | SkinAI{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card card">
        <div class="auth-header">
            <div class="logo justify-center">
                <i class="ph-fill ph-heartbeat"></i>
                <span>SkinAI</span>
            </div>
            <h2>Create Account</h2>
            <p class="text-muted">Sign up to start using the platform.</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon">
                    <i class="ph ph-user"></i>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="ph ph-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-icon">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up <i class="ph ph-user-plus"></i></button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a></p>
        </div>
    </div>
</div>
{% endblock %}
