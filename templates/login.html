{% extends 'base.html' %}
{% block title %}Login | SkinAI{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card card">
        <div class="auth-header">
            <div class="logo justify-center">
                <i class="ph-fill ph-heartbeat"></i>
                <span>SkinAI</span>
            </div>
            <h2>Welcome Back</h2>
            <p class="text-muted">Log in to access the diagnostic platform.</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon">
                    <i class="ph ph-user"></i>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="ph ph-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log In <i class="ph ph-sign-in"></i></button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
